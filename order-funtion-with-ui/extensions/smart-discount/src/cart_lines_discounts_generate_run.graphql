# cart_lines_discounts_generate_run.graphql
#
# We need:
#   1. cart.lines → to loop over and count unique products
#   2. line.merchandise.product.id → the unique product identifier
#   3. discount.discountClasses → to guard against wrong discount class being active
#
# NOTE: We do NOT query cost/subtotalAmount here because this discount
# is triggered by unique product count, not cart value.
# Keeping the query minimal = faster function execution.

